replicaCount: 1
image:
  repository: image-registry.openshift-image-registry.svc:5000/ecommerce/coupon-service
  tag: "latest"
  digest: ""
  pullPolicy: IfNotPresent

service:
  port: 8443

route:
  enabled: true
  host: "coupon-service-ecommerce.apps-crc.testing"
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect
  annotations: {}

env:
  SERVER_PORT: "8443"
  SERVER_SSL_ENABLED: "true"
  KEYCLOAK_ISSUER_URI: "https://keycloak-platform.apps-crc.testing/realms/master"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.platform.svc.cluster.local:9092"
  KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"

secret:
  name: "coupon-service-secret"
  create: false
  data: {}
  # data example:
  #   DB_HOST: "db"
  #   DB_PORT: "5432"
  #   DB_NAME: "coupon-service"
  #   DB_USER: "coupon-service"
  #   DB_PASSWORD: "change-me"

secretEnv:
  {}

translationSecret:
  enabled: true
  name: "tsatech-catalog-translation-dev"
  apiKeyKey: "OPENAI_API_KEY"
  modelKey: "OPENAI_MODEL"
  baseUrlKey: "OPENAI_BASE_URL"

tls:
  enabled: true
  secretName: "wildcard-apps-tls"

truststore:
  enabled: true
  secretName: "platform-truststore"
  mountPath: "/etc/ssl/openshift"
  password: "changeit"

resources:
  requests:
    cpu: "150m"
    memory: "384Mi"
  limits:
    cpu: "750m"
    memory: "1Gi"

readinessProbe:
  path: /actuator/health
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe:
  path: /actuator/health
  initialDelaySeconds: 20
  periodSeconds: 20

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
